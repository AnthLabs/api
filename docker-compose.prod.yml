services:
  mongodb:
    image: mongo:7
    container_name: api-mongodb
    restart: unless-stopped

    volumes:
      - mongodb_data:/data/db

    networks:
      - api-network

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: anth-api
    restart: unless-stopped

    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/api
      UPLOAD_DIRECTORY: /media/uploads
      HLS_DIRECTORY: /media/hls
      PUBLIC_HLS_URL: http://localhost:8080/media

    ports:
      - "3000:3000"

    volumes:
      - media_uploads:/media/uploads
      - media_hls:/media/hls

    depends_on:
      - mongodb

    networks:
      - api-network

  nginx:
    image: nginx:alpine
    container_name: api-nginx
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - media_hls:/var/www/media/hls:ro

    depends_on:
      - api

    networks:
      - api-network

volumes:
  mongodb_data:
  media_uploads:
  media_hls:

networks:
  api-network:
    driver: bridge

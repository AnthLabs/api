name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  API_HEALTH_URL: https://api-production-6c6b.up.railway.app/health

jobs:
  fmt:
    name: Cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Cargo clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        run: cargo audit

  test:
    name: Cargo test
    runs-on: ubuntu-latest
    needs: [clippy, audit]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  build:
    name: Cargo build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: anthlabs-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy:
    name: Trivy scan
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scan
        run: docker build -t anthlabs-api:test .

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: anthlabs-api:test
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

  smoke:
    name: Smoke test Railway
    runs-on: ubuntu-latest
    needs: trivy
    if: github.event_name == 'push'
    steps:
      - name: Wait before healthcheck
        run: sleep 60

      - name: Check API health
        run: |
          for i in {1..10}; do
            echo "Healthcheck attempt $i..."
            if curl -fsS "$API_HEALTH_URL"; then
              echo "API is healthy"
              exit 0
            fi
            sleep 15
          done

          echo "API healthcheck failed"
          exit 1
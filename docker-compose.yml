services:
  mongodb:
    image: mongo:7
    container_name: api-mongodb
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    networks:
      - api-network

  nginx:
    image: nginx:alpine
    container_name: api-nginx
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./media/hls:/var/www/media/hls:ro

    networks:
      - api-network

volumes:
  mongodb_data:

networks:
  api-network:
    driver: bridge
